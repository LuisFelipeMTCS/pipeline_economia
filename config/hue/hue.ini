[desktop]
secret_key=hue-pipeline-economia-secret
app_blacklist=search,hbase,impala,security,pig,sqoop,spark,oozie,zookeeper

[[database]]
engine=postgresql_psycopg2
host=postgres
port=5432
user=hive
password=hive
name=hue_db

[hadoop]
[[hdfs_clusters]]
[[[default]]]
fs_defaultfs=hdfs://namenode:8020
webhdfs_url=http://namenode:50070/webhdfs/v1
hadoop_conf_dir=/etc/hadoop/conf

[[yarn_clusters]]
[[[default]]]
submit_to=False
resourcemanager_host=localhost
resourcemanager_port=8032

[beeswax]
hive_server_host=hive
hive_server_port=10000
thrift_version=7
